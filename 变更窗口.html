<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>变更管理日历 - 带确认对话框版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f2ff 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 80, 200, 0.1);
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e6f2ff;
        }

        h1 {
            color: #003d7a;
            margin-bottom: 8px;
            font-size: 2.2em;
        }

        .subtitle {
            color: #6699cc;
            font-size: 1.1em;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(to right, #f8fbff, #f0f8ff);
            border-radius: 12px;
            border: 1px solid #d9e7ff;
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .year-selector input {
            width: 100px; /* 增加宽度以确保年份显示完整 */
            padding: 10px 15px;
            border: 2px solid #b3d1ff;
            border-radius: 8px;
            background-color: white;
            color: #003d7a;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
        }

        .year-selector input:hover {
            border-color: #6699ff;
            box-shadow: 0 0 0 3px rgba(102, 153, 255, 0.1);
        }

        .year-selector input:focus {
            outline: none;
            border-color: #0052a5;
            box-shadow: 0 0 0 3px rgba(0, 82, 165, 0.2);
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .month-selector select {
            padding: 10px 20px;
            border: 2px solid #b3d1ff;
            border-radius: 8px;
            background-color: white;
            color: #003d7a;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            min-width: 100px;
            transition: all 0.3s;
        }

        .month-selector select:hover {
            border-color: #6699ff;
            box-shadow: 0 0 0 3px rgba(102, 153, 255, 0.1);
        }

        .month-selector select:focus {
            outline: none;
            border-color: #0052a5;
            box-shadow: 0 0 0 3px rgba(0, 82, 165, 0.2);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #e6f0ff;
            color: #0052a5;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-buttons button:hover {
            background-color: #d1e4ff;
            transform: translateY(-2px);
        }

        .today-btn {
            background-color: #0052a5 !important;
            color: white !important;
        }

        .today-btn:hover {
            background-color: #003d7a !important;
        }

        .edit-mode-btn {
            background-color: #4CAF50 !important;
            color: white !important;
        }

        .edit-mode-btn:hover {
            background-color: #3d8b40 !important;
        }

        .save-btn {
            background-color: #FF9800 !important;
            color: white !important;
        }

        .save-btn:hover {
            background-color: #e68900 !important;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 15px 20px;
            background-color: #f8fbff;
            border-radius: 8px;
            border: 1px solid #e6f2ff;
            margin-bottom: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .strict-control-period {
            background-color: #ffcccc;
            border: 2px solid #ff6666;
        }

        .change-simple {
            background-color: #a3d977;
            border: 2px solid #8bc34a;
        }

        .change-standard {
            background-color: #6bb5ff;
            border: 2px solid #2196f3;
        }

        .change-important {
            background-color: #ffb366;
            border: 2px solid #ff9800;
        }

        .change-major {
            background-color: #ff8080;
            border: 2px solid #f44336;
        }

        .calendar-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e6f2ff;
            margin-bottom: 20px;
        }

        .calendar {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        .calendar thead th {
            background: linear-gradient(to bottom, #e6f2ff, #d9e7ff);
            color: #003d7a;
            font-weight: 600;
            padding: 15px 5px;
            text-align: center;
            border: 1px solid #cce0ff;
            font-size: 1.1em;
        }

        .calendar tbody td {
            width: 14.2857%; /* 固定宽度，7等分 */
            height: 140px; /* 增加高度以容纳更多内容 */
            vertical-align: top;
            padding: 8px;
            border: 1px solid #e6f2ff;
            position: relative;
            background-color: #fff;
            transition: all 0.2s;
            overflow: hidden;
        }

        .calendar tbody td:hover {
            background-color: #f8fbff;
        }

        .calendar tbody td.clickable {
            cursor: pointer;
        }

        /* 只在编辑模式下显示悬停边框 */
        .edit-mode .calendar tbody td.clickable:hover {
            outline: 2px solid #0052a5;
        }

        .other-month {
            background-color: #f9f9f9;
            color: #aaa;
        }

        .other-month .date-num {
            color: #ccc;
        }

        .today {
            background-color: #ffffe0 !important;
            position: relative;
        }

        .today::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid #ffcc00;
            pointer-events: none;
        }

        .weekend {
            background-color: #f5f9ff;
        }

        /* 工作日背景色 */
        .working-day {
            background-color: #f0fff0 !important; /* 浅绿色 */
        }

        .non-working-day {
            background-color: #fff0f0 !important; /* 浅红色 */
        }

        .edit-mode-highlight {
            position: relative;
        }

        .edit-mode-highlight::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px dashed #4CAF50;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .date-num {
            font-size: 1.4em;
            font-weight: 700;
            color: #003d7a;
        }

        .lunar {
            font-size: 0.8em;
            color: #888;
            font-weight: 500;
        }

        /* 严控期标记 - 红色横条 */
        .strict-control-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #ff6666;
            z-index: 5;
        }

        /* 严控期标记 - 连接线 */
        .strict-control-connector {
            position: absolute;
            top: 3px;
            width: 20px;
            height: 0;
            border-top: 2px dashed #ff6666;
            z-index: 4;
        }

        .strict-control-connector.left {
            right: 100%;
        }

        .strict-control-connector.right {
            left: 100%;
        }

        /* 节假日标记 - 调整到阴历日期下方 */
        .holiday-marker {
            position: relative;
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #e60000;
            border-radius: 50%;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7em;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(230, 0, 0, 0.3);
        }

        /* 调休标记 - 深蓝色 */
        .workday-marker {
            position: relative;
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #0066cc;
            border-radius: 50%;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7em;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(0, 102, 204, 0.3);
        }

        /* 变更窗口信息 - 默认只显示前两个 */
        .change-windows {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            max-height: 60px;
            overflow: hidden;
        }

        .change-window {
            font-size: 0.75em;
            padding: 2px 4px;
            margin-bottom: 2px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .change-window.simple {
            background-color: rgba(163, 217, 119, 0.3);
            color: #4a7c1a;
            border-left: 3px solid #8bc34a;
        }

        .change-window.standard {
            background-color: rgba(107, 181, 255, 0.3);
            color: #0052a5;
            border-left: 3px solid #2196f3;
        }

        .change-window.important {
            background-color: rgba(255, 179, 102, 0.3);
            color: #b35900;
            border-left: 3px solid #ff9800;
        }

        .change-window.major {
            background-color: rgba(255, 128, 128, 0.3);
            color: #b30000;
            border-left: 3px solid #f44336;
        }

        /* 更多按钮 */
        .more-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 82, 165, 0.1);
            color: #0052a5;
            border: 1px solid rgba(0, 82, 165, 0.3);
            border-radius: 3px;
            padding: 1px 4px;
            font-size: 0.7em;
            cursor: pointer;
            z-index: 7;
            text-decoration: none;
        }

        .more-btn:hover {
            background-color: rgba(0, 82, 165, 0.2);
        }

        /* 变更窗口浮窗 */
        .change-popup {
            position: fixed;
            background-color: white;
            border: 2px solid #0052a5;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 15px;
            z-index: 1000;
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .change-popup-header {
            font-weight: bold;
            color: #003d7a;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e6f2ff;
        }

        .change-popup-item {
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .change-popup-item.simple {
            background-color: #f0ffe0;
            border-left: 4px solid #8bc34a;
        }

        .change-popup-item.standard {
            background-color: #e6f2ff;
            border-left: 4px solid #2196f3;
        }

        .change-popup-item.important {
            background-color: #fff0e6;
            border-left: 4px solid #ff9800;
        }

        .change-popup-item.major {
            background-color: #ffe6e6;
            border-left: 4px solid #f44336;
        }

        .change-popup-time {
            font-weight: bold;
            color: #003d7a;
        }

        .change-popup-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 8px;
        }

        .change-popup-type.simple {
            background-color: #8bc34a;
            color: white;
        }

        .change-popup-type.standard {
            background-color: #2196f3;
            color: white;
        }

        .change-popup-type.important {
            background-color: #ff9800;
            color: white;
        }

        .change-popup-type.major {
            background-color: #f44336;
            color: white;
        }

        /* 确认对话框样式 */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            display: none;
        }

        .confirm-content {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .confirm-header {
            font-weight: bold;
            color: #003d7a;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-align: center;
        }

        .confirm-message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .confirm-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .confirm-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-ok {
            background-color: #4CAF50;
            color: white;
        }

        .confirm-ok:hover {
            background-color: #3d8b40;
        }

        .confirm-cancel {
            background-color: #f0f0f0;
            color: #666;
        }

        .confirm-cancel:hover {
            background-color: #e0e0e0;
        }

        .footer-note {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8fbff;
            border-radius: 8px;
            text-align: center;
            color: #6699cc;
            font-size: 0.9em;
            border-top: 2px solid #e6f2ff;
        }

        .current-period-info {
            margin-top: 5px;
            font-size: 0.85em;
            color: #666;
        }

        /* 响应式调整 */
        @media (max-width: 1200px) {
            .container {
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
                gap: 20px;
            }
            
            .date-selector {
                order: 1;
            }
            
            .nav-buttons {
                order: 2;
            }
            
            .legend {
                order: 3;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <header>
            <h1>变更管理日历 - 带确认对话框版</h1>
            <p class="subtitle">特殊工作日设置 | 编辑模式 | 调休标记</p>
        </header>

        <div class="controls">
            <div class="date-selector">
                <div class="year-selector">
                    <input type="number" id="year-input" min="2000" max="2100" value="2026">
                    <span style="color: #003d7a; font-weight: 600; font-size: 1.1em;">年</span>
                </div>
                
                <div class="month-selector">
                    <select id="month-select">
                        <option value="0">1</option>
                        <option value="1">2</option>
                        <option value="2">3</option>
                        <option value="3">4</option>
                        <option value="4">5</option>
                        <option value="5">6</option>
                        <option value="6">7</option>
                        <option value="7">8</option>
                        <option value="8">9</option>
                        <option value="9">10</option>
                        <option value="10">11</option>
                        <option value="11">12</option>
                    </select>
                    <span style="color: #003d7a; font-weight: 600; font-size: 1.1em;">月</span>
                </div>
            </div>
            
            <div class="nav-buttons">
                <button id="prev-month">
                    <span>◀</span> 上月
                </button>
                <button id="today-btn" class="today-btn">
                    今天
                </button>
                <button id="next-month">
                    下月 <span>▶</span>
                </button>
                <button id="set-workday-btn" class="edit-mode-btn">
                    设置特殊工作日
                </button>
                <button id="save-workday-btn" class="save-btn" style="display: none;">
                    保存修改
                </button>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="legend-color strict-control-period"></span> 严控期（红色横条）</div>
            <div class="legend-item"><span class="legend-color change-simple"></span> 简单变更</div>
            <div class="legend-item"><span class="legend-color change-standard"></span> 标准变更</div>
            <div class="legend-item"><span class="legend-color change-important"></span> 重要变更</div>
            <div class="legend-item"><span class="legend-color change-major"></span> 重大变更</div>
            <div class="legend-item"><span style="width:20px;height:20px;border-radius:50%;background-color:#e60000;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:0.7em;">休</span> 节假日</div>
            <div class="legend-item"><span style="width:20px;height:20px;border-radius:50%;background-color:#0066cc;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:0.7em;">调</span> 调休日</div>
            <div class="legend-item"><span style="width:20px;height:20px;border-radius:4px;background-color:#f0fff0;border:1px solid #4CAF50;display:inline-block;"></span> 工作日背景</div>
            <div class="legend-item"><span style="width:20px;height:20px;border-radius:4px;background-color:#fff0f0;border:1px solid #FF9800;display:inline-block;"></span> 非工作日背景</div>
            <div class="legend-item"><span style="width:20px;height:20px;border-radius:4px;border:2px dashed #4CAF50;display:inline-block;"></span> 编辑模式高亮</div>
        </div>

        <div class="calendar-wrapper">
            <table class="calendar" id="calendar">
                <thead>
                    <tr>
                        <th>周日</th>
                        <th>周一</th>
                        <th>周二</th>
                        <th>周三</th>
                        <th>周四</th>
                        <th>周五</th>
                        <th>周六</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                    <!-- 日历由JavaScript动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- 变更窗口浮窗 -->
        <div id="change-popup" class="change-popup">
            <div id="change-popup-header" class="change-popup-header"></div>
            <div id="change-popup-content"></div>
        </div>

        <!-- 确认对话框 -->
        <div id="confirm-dialog" class="confirm-dialog">
            <div class="confirm-content">
                <div class="confirm-header">确认保存</div>
                <div class="confirm-message" id="confirm-message">
                    您已修改了 <span id="modified-count">0</span> 个工作日的状态。确定要保存这些修改吗？
                </div>
                <div class="confirm-buttons">
                    <button id="confirm-cancel" class="confirm-btn confirm-cancel">取消</button>
                    <button id="confirm-ok" class="confirm-btn confirm-ok">确定保存</button>
                </div>
            </div>
        </div>

        <div class="footer-note">
            <p>提示：严控期显示为日期格子上方的红色横条，节假日以红色圆形"休"字标记，调休日以深蓝色圆形"调"字标记。点击"设置特殊工作日"进入编辑模式，此时可点击日期格子切换工作日状态，编辑完成后点击"保存修改"保存更改。</p>
            <p>变更窗口默认显示前两个，点击"更多"按钮查看所有变更窗口。</p>
        </div>
    </div>

    <script>
        // 当前显示的日期
        let currentDate = new Date(2026, 2, 1); // 2026年3月1日
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // 工作日状态存储
        let workdayStatus = {
            // 默认状态：周一到周五为工作日，周六日为非工作日
            'default': {
                1: 'working', // 周一
                2: 'working', // 周二
                3: 'working', // 周三
                4: 'working', // 周四
                5: 'working', // 周五
                6: 'non-working', // 周六
                0: 'non-working'  // 周日
            },
            // 自定义的特定日期状态
            'custom': {}
        };

        // 编辑模式状态
        let isEditMode = false;
        let editModeChanges = {}; // 存储编辑模式下的临时修改

        // 1. 预置严控期数据
        const strictControlPeriods = [
            { start: '2026-03-30', end: '2026-04-05', reason: '清明节前系统维稳' },
            { start: '2026-09-28', end: '2026-10-08', reason: '国庆黄金周严控' },
            { start: '2026-12-25', end: '2026-12-31', reason: '年终结算' },
            { start: '2026-06-01', end: '2026-06-07', reason: '高考期间' },
            { start: '2026-11-11', end: '2026-11-12', reason: '购物节保障' }
        ];

        // 2. 预置周期性变更窗口
        const changeWindows = [
            // 每周一至周日 18:00 - 次日06:00 为简单变更窗口
            {
                type: 'simple',
                weeklyPattern: [1, 2, 3, 4, 5, 6, 0],
                timeRange: '18:00-次日06:00',
                description: '夜间变更窗口'
            },
            // 每月第一个周六 00:00-12:00 为标准变更窗口
            {
                type: 'standard',
                weeklyPattern: [6],
                occurrenceInMonth: 1,
                timeRange: '00:00-12:00',
                description: '月度标准变更'
            },
            // 每月第三个周日 02:00-06:00 为重要变更窗口
            {
                type: 'important',
                weeklyPattern: [0],
                occurrenceInMonth: 3,
                timeRange: '02:00-06:00',
                description: '月度重要变更'
            },
            // 特定日期的重要/重大变更
            {
                type: 'important',
                dates: ['2026-03-15', '2026-06-20', '2026-11-10'],
                timeRange: '22:00-次日02:00'
            },
            {
                type: 'major',
                dates: ['2026-05-01', '2026-10-01', '2026-12-25'],
                timeRange: '00:00-06:00'
            },
            // 为3月15日添加多个变更窗口，用于测试
            {
                type: 'simple',
                dates: ['2026-03-15'],
                timeRange: '00:00-02:00',
                description: '凌晨简单变更'
            },
            {
                type: 'standard',
                dates: ['2026-03-15'],
                timeRange: '02:00-04:00',
                description: '凌晨标准变更'
            },
            {
                type: 'important',
                dates: ['2026-03-15'],
                timeRange: '04:00-06:00',
                description: '凌晨重要变更'
            },
            {
                type: 'major',
                dates: ['2026-03-15'],
                timeRange: '06:00-08:00',
                description: '早晨重大变更'
            },
            {
                type: 'simple',
                dates: ['2026-03-15'],
                timeRange: '08:00-10:00',
                description: '上午简单变更'
            },
            {
                type: 'standard',
                dates: ['2026-03-15'],
                timeRange: '10:00-12:00',
                description: '上午标准变更'
            },
            {
                type: 'important',
                dates: ['2026-03-15'],
                timeRange: '12:00-14:00',
                description: '中午重要变更'
            }
        ];

        // 3. 2026年节假日数据
        const holidays = [
            '2026-01-01', // 元旦
            '2026-01-28', '2026-01-29', '2026-01-30', '2026-01-31', // 春节相关
            '2026-02-01', '2026-02-02', '2026-02-15',
            '2026-04-04', // 清明节
            '2026-05-01', // 劳动节
            '2026-06-01', // 儿童节
            '2026-06-19', // 端午节
            '2026-09-25', // 中秋节
            '2026-10-01', '2026-10-02', '2026-10-03' // 国庆节
        ];

        // 4. 简化版农历数据
        const lunarData = {
            '2026-01-01': '冬月十三', '2026-01-28': '腊月廿八', '2026-01-29': '腊月廿九',
            '2026-01-30': '除夕', '2026-01-31': '大年初一', '2026-02-01': '正月初二',
            '2026-02-02': '正月初三', '2026-02-15': '正月十五', '2026-03-30': '二月十二',
            '2026-03-31': '二月十三', '2026-04-01': '二月十四', '2026-04-04': '二月十七',
            '2026-04-05': '二月十八', '2026-05-01': '三月十五', '2026-06-01': '四月十六',
            '2026-06-19': '五月初五', '2026-09-25': '八月十五', '2026-10-01': '八月廿一',
            '2026-12-25': '冬月十七'
        };

        // 工具函数：格式化日期为 YYYY-MM-DD
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 工具函数：从日期字符串创建Date对象
        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        // 初始化年份输入框
        function initYearInput() {
            const yearInput = document.getElementById('year-input');
            const year = currentDate.getFullYear();
            yearInput.value = year;
        }

        // 初始化月份选择框
        function initMonthSelect() {
            const monthSelect = document.getElementById('month-select');
            const month = currentDate.getMonth(); // 0-11
            monthSelect.value = month;
        }

        // 更新年份和月份选择器
        function updateSelectors() {
            const yearInput = document.getElementById('year-input');
            const monthSelect = document.getElementById('month-select');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            yearInput.value = year;
            monthSelect.value = month;
        }

        // 判断日期是否在严控期内
        function isInStrictControlPeriod(dateStr) {
            for (const period of strictControlPeriods) {
                if (dateStr >= period.start && dateStr <= period.end) {
                    return period;
                }
            }
            return null;
        }

        // 检查严控期连接性
        function getStrictControlConnectors(dateStr, dateObj) {
            const connectors = [];
            const prevDate = new Date(dateObj);
            prevDate.setDate(prevDate.getDate() - 1);
            const prevDateStr = formatDate(prevDate);
            
            const nextDate = new Date(dateObj);
            nextDate.setDate(nextDate.getDate() + 1);
            const nextDateStr = formatDate(nextDate);
            
            // 检查前一天是否也在严控期内
            if (isInStrictControlPeriod(prevDateStr)) {
                connectors.push('left');
            }
            
            // 检查后一天是否也在严控期内
            if (isInStrictControlPeriod(nextDateStr)) {
                connectors.push('right');
            }
            
            return connectors;
        }

        // 获取日期对应的变更窗口信息
        function getChangeWindowsForDate(dateObj) {
            const dateStr = formatDate(dateObj);
            const dayOfWeek = dateObj.getDay();
            const dayOfMonth = dateObj.getDate();
            const windows = [];

            for (const window of changeWindows) {
                let match = false;
                if (window.dates) {
                    match = window.dates.includes(dateStr);
                } else if (window.weeklyPattern) {
                    match = window.weeklyPattern.includes(dayOfWeek);
                    if (match && window.occurrenceInMonth) {
                        const firstDayOfMonth = new Date(dateObj.getFullYear(), dateObj.getMonth(), 1);
                        const firstDayOfMonthWeekday = firstDayOfMonth.getDay();
                        // 计算当月第一个目标星期几的日期
                        let firstTargetDate = 1;
                        if (window.weeklyPattern[0] >= firstDayOfMonthWeekday) {
                            firstTargetDate += (window.weeklyPattern[0] - firstDayOfMonthWeekday);
                        } else {
                            firstTargetDate += (7 - firstDayOfMonthWeekday + window.weeklyPattern[0]);
                        }
                        // 计算第N个目标日期
                        const targetDate = firstTargetDate + (window.occurrenceInMonth - 1) * 7;
                        match = (dayOfMonth === targetDate);
                    }
                }
                if (match) {
                    windows.push({
                        type: window.type,
                        timeRange: window.timeRange || '全天',
                        description: window.description || ''
                    });
                }
            }
            return windows;
        }

        // 获取农历
        function getLunar(dateStr) {
            return lunarData[dateStr] || '';
        }

        // 判断是否为周末
        function isWeekend(dayOfWeek) {
            return dayOfWeek === 0 || dayOfWeek === 6;
        }

        // 判断是否为节假日
        function isHoliday(dateStr) {
            return holidays.includes(dateStr);
        }

        // 判断是否为调休日
        function isWorkdayAdjustment(dateStr, dayOfWeek) {
            // 检查是否在自定义状态中，且状态为工作日
            if (workdayStatus.custom[dateStr] === 'working') {
                // 检查是否是周末或节假日
                if (isWeekend(dayOfWeek) || isHoliday(dateStr)) {
                    return true;
                }
            }
            return false;
        }

        // 获取工作日状态
        function getWorkdayStatus(dateStr, dayOfWeek) {
            // 首先检查编辑模式下的修改
            if (isEditMode && editModeChanges[dateStr] !== undefined) {
                return editModeChanges[dateStr];
            }
            
            // 然后检查自定义状态
            if (workdayStatus.custom[dateStr]) {
                return workdayStatus.custom[dateStr];
            }
            
            // 返回默认状态
            return workdayStatus.default[dayOfWeek];
        }

        // 切换工作日状态（编辑模式下使用）
        function toggleWorkdayStatusInEditMode(dateStr) {
            if (!isEditMode) return;
            
            const dayOfWeek = parseDate(dateStr).getDay();
            const currentStatus = getWorkdayStatus(dateStr, dayOfWeek);
            
            // 在编辑模式下切换状态
            editModeChanges[dateStr] = currentStatus === 'working' ? 'non-working' : 'working';
            
            // 重新渲染日历
            renderCalendar();
        }

        // 显示确认对话框
        function showConfirmDialog() {
            if (!isEditMode) return;
            
            const modifiedCount = Object.keys(editModeChanges).length;
            
            if (modifiedCount === 0) {
                // 如果没有修改，直接保存
                saveEditModeChanges();
                return;
            }
            
            // 更新确认消息
            document.getElementById('modified-count').textContent = modifiedCount;
            
            // 显示确认对话框
            document.getElementById('confirm-dialog').style.display = 'flex';
        }

        // 隐藏确认对话框
        function hideConfirmDialog() {
            document.getElementById('confirm-dialog').style.display = 'none';
        }

        // 保存编辑模式下的修改
        function saveEditModeChanges() {
            if (!isEditMode) return;
            
            // 将编辑模式下的修改应用到正式状态
            Object.keys(editModeChanges).forEach(dateStr => {
                workdayStatus.custom[dateStr] = editModeChanges[dateStr];
            });
            
            // 退出编辑模式
            exitEditMode();
            
            // 重新渲染日历
            renderCalendar();
            
            // 显示保存成功提示
            alert('工作日设置已保存！');
        }

        // 进入编辑模式
        function enterEditMode() {
            isEditMode = true;
            editModeChanges = {};
            
            // 显示保存按钮，隐藏设置按钮
            document.getElementById('set-workday-btn').style.display = 'none';
            document.getElementById('save-workday-btn').style.display = 'block';
            
            // 给主容器添加编辑模式类
            document.getElementById('main-container').classList.add('edit-mode');
            
            // 重新渲染日历
            renderCalendar();
            
            // 显示提示
            alert('已进入编辑模式，可以点击日期格子切换工作日状态。编辑完成后请点击"保存修改"按钮。');
        }

        // 退出编辑模式
        function exitEditMode() {
            isEditMode = false;
            editModeChanges = {};
            
            // 显示设置按钮，隐藏保存按钮
            document.getElementById('set-workday-btn').style.display = 'block';
            document.getElementById('save-workday-btn').style.display = 'none';
            
            // 移除主容器的编辑模式类
            document.getElementById('main-container').classList.remove('edit-mode');
        }

        // 显示变更窗口浮窗
        function showChangePopup(dateStr, dateObj, windows, x, y) {
            const popup = document.getElementById('change-popup');
            const popupHeader = document.getElementById('change-popup-header');
            const popupContent = document.getElementById('change-popup-content');
            
            // 设置浮窗内容
            const dateText = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
            popupHeader.textContent = `${dateText} 变更窗口`;
            
            // 清空之前的内容
            popupContent.innerHTML = '';
            
            // 如果没有变更窗口
            if (windows.length === 0) {
                popupContent.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">无变更窗口</div>';
            } else {
                // 添加每个变更窗口
                windows.forEach(window => {
                    const typeText = window.type === 'simple' ? '简单' : 
                                   window.type === 'standard' ? '标准' : 
                                   window.type === 'important' ? '重要' : '重大';
                    
                    const item = document.createElement('div');
                    item.className = `change-popup-item ${window.type}`;
                    
                    const typeSpan = document.createElement('span');
                    typeSpan.className = `change-popup-type ${window.type}`;
                    typeSpan.textContent = typeText;
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'change-popup-time';
                    timeSpan.textContent = window.timeRange;
                    
                    const descSpan = document.createElement('div');
                    descSpan.style.marginTop = '5px';
                    descSpan.style.color = '#666';
                    descSpan.style.fontSize = '0.85em';
                    descSpan.textContent = window.description || '变更窗口';
                    
                    item.appendChild(typeSpan);
                    item.appendChild(timeSpan);
                    item.appendChild(descSpan);
                    popupContent.appendChild(item);
                });
            }
            
            // 设置浮窗位置
            const popupWidth = popup.offsetWidth;
            const popupHeight = popup.offsetHeight;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // 计算位置，确保浮窗不超出屏幕
            let left = x;
            let top = y;
            
            if (left + popupWidth > windowWidth) {
                left = windowWidth - popupWidth - 20;
            }
            
            if (top + popupHeight > windowHeight) {
                top = windowHeight - popupHeight - 20;
            }
            
            // 确保位置不为负数
            left = Math.max(20, left);
            top = Math.max(20, top);
            
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.style.display = 'block';
            
            // 添加点击外部关闭浮窗的事件
            setTimeout(() => {
                const closePopup = function(e) {
                    if (!popup.contains(e.target)) {
                        popup.style.display = 'none';
                        document.removeEventListener('click', closePopup);
                    }
                };
                document.addEventListener('click', closePopup);
            }, 100);
        }

        // 渲染日历
        function renderCalendar() {
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';
            
            updateSelectors();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const startingDayOfWeek = firstDayOfMonth.getDay();
            const totalDays = lastDayOfMonth.getDate();
            const prevMonthLastDay = new Date(year, month, 0).getDate();

            let date = 1;
            let html = '';

            for (let row = 0; row < 6; row++) {
                html += '<tr>';
                for (let col = 0; col < 7; col++) {
                    const dayOfWeek = col;
                    let cellDate;
                    let cellDateStr;
                    let isCurrentMonth = false;
                    let isToday = false;

                    if (row === 0 && col < startingDayOfWeek) {
                        const dayNum = prevMonthLastDay - startingDayOfWeek + col + 1;
                        cellDate = new Date(year, month - 1, dayNum);
                        cellDateStr = formatDate(cellDate);
                    } else if (date > totalDays) {
                        const dayNum = date - totalDays;
                        cellDate = new Date(year, month + 1, dayNum);
                        cellDateStr = formatDate(cellDate);
                        date++;
                    } else {
                        cellDate = new Date(year, month, date);
                        cellDateStr = formatDate(cellDate);
                        isCurrentMonth = true;
                        date++;
                    }

                    if (formatDate(cellDate) === formatDate(today)) {
                        isToday = true;
                    }

                    const lunar = getLunar(cellDateStr);
                    const strictControlInfo = isInStrictControlPeriod(cellDateStr);
                    const changeWindows = getChangeWindowsForDate(cellDate);
                    const isHolidayDay = isHoliday(cellDateStr);
                    const workdayStatusType = getWorkdayStatus(cellDateStr, cellDate.getDay());
                    const isWorkdayAdjust = isWorkdayAdjustment(cellDateStr, cellDate.getDay());
                    
                    // 获取严控期连接线
                    let strictControlConnectors = [];
                    if (strictControlInfo) {
                        strictControlConnectors = getStrictControlConnectors(cellDateStr, cellDate);
                    }

                    // 构建单元格CSS类
                    let cellClass = 'clickable';
                    if (!isCurrentMonth) cellClass += ' other-month';
                    if (isToday) cellClass += ' today';
                    if (isWeekend(cellDate.getDay())) cellClass += ' weekend';
                    if (workdayStatusType === 'working') {
                        cellClass += ' working-day';
                    } else {
                        cellClass += ' non-working-day';
                    }
                    
                    // 编辑模式下添加高亮
                    if (isEditMode && isCurrentMonth) {
                        cellClass += ' edit-mode-highlight';
                    }

                    // 构建变更窗口HTML - 最多显示2条
                    let changeWindowsHtml = '';
                    let moreBtnHtml = '';
                    if (changeWindows.length > 0) {
                        changeWindowsHtml = '<div class="change-windows">';
                        const maxDisplay = 2; // 最多显示2条
                        const displayWindows = changeWindows.slice(0, maxDisplay);
                        
                        displayWindows.forEach(window => {
                            const typeText = window.type === 'simple' ? '简' : 
                                           window.type === 'standard' ? '标' : 
                                           window.type === 'important' ? '重' : '大';
                            changeWindowsHtml += `<div class="change-window ${window.type}" title="${typeText}变更 ${window.timeRange}">${typeText} ${window.timeRange}</div>`;
                        });
                        
                        // 如果有更多变更窗口，显示"更多"按钮
                        if (changeWindows.length > maxDisplay) {
                            moreBtnHtml = `<a class="more-btn" data-date="${cellDateStr}">更多</a>`;
                        }
                        
                        changeWindowsHtml += '</div>';
                    }

                    // 严控期标记
                    let strictControlHtml = '';
                    if (strictControlInfo) {
                        strictControlHtml = '<div class="strict-control-bar" title="严控期"></div>';
                        
                        // 添加连接线
                        strictControlConnectors.forEach(connector => {
                            strictControlHtml += `<div class="strict-control-connector ${connector}"></div>`;
                        });
                    }

                    // 节假日标记
                    let holidayMarkerHtml = '';
                    if (isHolidayDay && !isWorkdayAdjust) {
                        holidayMarkerHtml = '<div class="holiday-marker" title="节假日">休</div>';
                    }
                    
                    // 调休标记
                    let workdayMarkerHtml = '';
                    if (isWorkdayAdjust) {
                        workdayMarkerHtml = '<div class="workday-marker" title="调休日">调</div>';
                    }

                    // 日期头部（公历+农历）
                    let dateHeaderHtml = '';
                    dateHeaderHtml += '<div class="date-header">';
                    dateHeaderHtml += `<div class="date-num">${cellDate.getDate()}</div>`;
                    if (lunar) {
                        dateHeaderHtml += `<div class="lunar">${lunar}</div>`;
                    }
                    dateHeaderHtml += '</div>';
                    
                    // 如果有节假日或调休标记，添加到农历日期下方
                    if (isHolidayDay && !isWorkdayAdjust) {
                        dateHeaderHtml += holidayMarkerHtml;
                    } else if (isWorkdayAdjust) {
                        dateHeaderHtml += workdayMarkerHtml;
                    }

                    html += `<td class="${cellClass}" data-date="${cellDateStr}">`;
                    html += strictControlHtml;
                    html += dateHeaderHtml;
                    
                    // 显示当前期间的严控期原因
                    if (strictControlInfo && isCurrentMonth) {
                        html += `<div class="current-period-info" title="${strictControlInfo.reason}">${strictControlInfo.reason.substring(0, 8)}...</div>`;
                    }
                    
                    html += changeWindowsHtml;
                    html += moreBtnHtml;
                    
                    // 在编辑模式下显示编辑状态提示
                    if (isEditMode && isCurrentMonth && editModeChanges[cellDateStr]) {
                        const editStatus = editModeChanges[cellDateStr] === 'working' ? '工作日' : '非工作日';
                        html += `<div style="position:absolute;bottom:30px;right:8px;font-size:0.7em;color:#4CAF50;font-weight:bold;">已修改</div>`;
                    }
                    
                    html += '</td>';
                }
                html += '</tr>';
                if (date > totalDays && row > 3) break;
            }

            calendarBody.innerHTML = html;
            
            // 为日期单元格添加点击事件
            document.querySelectorAll('td.clickable').forEach(cell => {
                cell.addEventListener('click', function(e) {
                    // 检查是否点击了"更多"按钮
                    if (e.target.classList.contains('more-btn')) {
                        e.stopPropagation(); // 阻止事件冒泡
                        const dateStr = e.target.getAttribute('data-date');
                        const dateObj = parseDate(dateStr);
                        const windows = getChangeWindowsForDate(dateObj);
                        showChangePopup(dateStr, dateObj, windows, e.clientX, e.clientY);
                        return;
                    }
                    
                    // 只有在编辑模式下才能切换工作日状态
                    if (isEditMode) {
                        const dateStr = this.getAttribute('data-date');
                        toggleWorkdayStatusInEditMode(dateStr);
                    }
                });
            });
        }

        // 事件监听器
        function initEventListeners() {
            // 年份输入
            document.getElementById('year-input').addEventListener('change', function() {
                const year = parseInt(this.value);
                if (year >= 2000 && year <= 2100) {
                    currentDate.setFullYear(year);
                    renderCalendar();
                } else {
                    this.value = currentDate.getFullYear();
                }
            });

            // 月份选择
            document.getElementById('month-select').addEventListener('change', function() {
                const month = parseInt(this.value);
                currentDate.setMonth(month);
                renderCalendar();
            });

            // 导航按钮
            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            document.getElementById('today-btn').addEventListener('click', () => {
                currentDate = new Date();
                currentDate.setHours(0, 0, 0, 0);
                renderCalendar();
            });

            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            // 设置特殊工作日按钮
            document.getElementById('set-workday-btn').addEventListener('click', () => {
                enterEditMode();
            });

            // 保存修改按钮
            document.getElementById('save-workday-btn').addEventListener('click', () => {
                showConfirmDialog();
            });

            // 确认对话框按钮
            document.getElementById('confirm-ok').addEventListener('click', () => {
                hideConfirmDialog();
                saveEditModeChanges();
            });

            document.getElementById('confirm-cancel').addEventListener('click', () => {
                hideConfirmDialog();
                // 用户取消保存，保持在编辑模式
            });
        }

        // 初始化
        function init() {
            initYearInput();
            initMonthSelect();
            initEventListeners();
            renderCalendar();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
