<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 原有样式保持不变 ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            display: flex;
            height: 100vh;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .sidebar {
            width: 240px;
            background-color: #fff;
            border-right: 1px solid #e1e5eb;
            display: flex;
            flex-direction: column;
            box-shadow: 1px 0 5px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        
        .logo-area {
            padding: 20px 16px;
            border-bottom: 1px solid #e1e5eb;
            font-weight: 600;
            font-size: 18px;
            color: #2c3e50;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .logo-area:hover {
            background-color: #f8f9fa;
        }
        
        .logo-area i {
            color: #3a86ff;
            margin-right: 8px;
        }
        
        /* 修改点3: 在logo区域下方添加新建按钮 */
        .sidebar-new-btn {
            padding: 12px 16px;
            background-color: #3a86ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
            margin: 0 16px 16px;
        }
        
        .sidebar-new-btn:hover {
            background-color: #2a76ef;
        }
        
        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .nav-section {
            margin-bottom: 20px;
        }
        
        .nav-section-title {
            font-size: 12px;
            color: #95a5a6;
            padding: 8px 16px 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            color: #4a5568;
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        
        .nav-item.active {
            background-color: #f0f7ff;
            color: #3a86ff;
            border-left-color: #3a86ff;
            font-weight: 600;
        }
        
        .nav-item i {
            width: 20px;
            margin-right: 12px;
            text-align: center;
            font-size: 16px;
        }
        
        .badge {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        /* 内容区域 - 初始隐藏 */
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: none; /* 初始隐藏 */
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .category-search-box {
            position: relative;
            margin-right: 8px;
        }
        
        .category-search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 14px;
        }
        
        .category-search-box input {
            padding: 6px 12px 6px 32px;
            border: 1px solid #e1e5eb;
            border-radius: 6px;
            font-size: 13px;
            width: 180px;
            transition: all 0.2s;
            background-color: #fff;
        }
        
        .category-search-box input:focus {
            outline: none;
            border-color: #3a86ff;
            box-shadow: 0 0 0 2px rgba(58, 134, 255, 0.1);
        }
        
        .category-search-box input::placeholder {
            color: #a0aec0;
        }
        
        .category-tab {
            padding: 8px 16px;
            border: 1px solid #e1e5eb;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .category-tab:hover {
            border-color: #3a86ff;
            color: #3a86ff;
        }
        
        .category-tab.active {
            background-color: #3a86ff;
            color: white;
            border-color: #3a86ff;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .card {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #e1e5eb;
            padding: 20px;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }
        
        .card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
            border-color: #d0e2ff;
        }
        
        .card-icon {
            width: 48px;
            height: 48px;
            background-color: #f0f7ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: #3a86ff;
            font-size: 20px;
        }
        
        .card-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        
        .card-desc {
            font-size: 13px;
            color: #7b8a8b;
            line-height: 1.5;
        }
        
        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #e0e0e0;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }
        
        .favorite-btn:hover {
            color: #ffc107;
        }
        
        .favorite-btn.active {
            color: #ffc107;
        }
        
        /* 移除内容区域的新建按钮样式 */
        .new-button {
            display: none; /* 隐藏内容区域的新建按钮 */
        }
        
        .welcome-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        
        .welcome-icon {
            font-size: 80px;
            color: #3a86ff;
            margin-bottom: 20px;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 16px;
        }
        
        .welcome-description {
            font-size: 18px;
            color: #64748b;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        
        .welcome-actions {
            display: flex;
            gap: 16px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e1e5eb;
            }
            
            .nav-menu {
                display: flex;
                flex-wrap: wrap;
                padding: 8px;
            }
            
            .nav-section {
                flex: 1;
                min-width: 150px;
                margin-bottom: 0;
            }
            
            .sidebar-new-btn {
                margin: 0 8px 8px;
            }
        }
        
        @media (max-width: 576px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .category-tabs {
                overflow-x: auto;
                white-space: nowrap;
                padding-bottom: 8px;
            }
            
            .category-search-box {
                width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
            }
            
            .category-search-box input {
                width: 100%;
            }
        }
        
        .card.highlighted {
            border-color: #3a86ff;
            background-color: #f8fbff;
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }
        
        .no-results i {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <div class="sidebar">
        <!-- 左上角"变更管理系统" -->
        <div class="logo-area" id="logoArea">

        <!-- 修改点3: 在logo区域下方添加新建按钮 -->

        <div class="nav-menu">

            <!-- 已移除的变更管理部分（已移至上方） -->
        </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 欢迎页面（初始显示） -->
        <div class="welcome-page" id="welcomePage">
            <div class="welcome-icon">
                <i class="fas fa-ticket-alt"></i>
            </div>
            <h1 class="welcome-title">欢迎使用工单管理系统</h1>
            <p class="welcome-description">
                高效管理您的工单流程，从创建、分配到完成，全程跟踪每个工单的状态。
                点击"新建"按钮开始创建第一个工单，或从左侧导航栏中选择其他功能。
            </p>
            <div class="welcome-actions">
                <button class="sidebar-new-btn" id="welcomeNewBtn">
                    <i class="fas fa-plus"></i>新建工单
                </button>
            </div>
        </div>
        
        <!-- 内容区域（初始隐藏） -->
        <div class="content-area" id="contentArea">
            <div class="header-row">
                <h1 class="page-title" id="pageTitle">所有工单</h1>
                <!-- 修改点3: 已移除内容区域的新建按钮 -->
            </div>
            
            <!-- 分类标签和搜索框 -->
            <div class="category-tabs" id="categoryTabs">
                <!-- 分类标签将通过JavaScript动态生成 -->
            </div>
            
            <!-- 工单卡片网格 -->
            <div class="cards-grid" id="cardsGrid">
                <!-- 卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <script>
        // 卡片数据
        const cardData = {
            all: [
                { id: 1, title: "资产入库流程", category: "resource", favorite: true, description: "资产入库的标准流程" },
                { id: 2, title: "设备上架流程", category: "resource", favorite: false, description: "新设备上架的标准流程" },
                { id: 3, title: "技术整体方案+多云管理+256", category: "change", favorite: false, description: "技术整体方案与多云管理" },
                { id: 4, title: "测试2", category: "task", favorite: false, description: "测试工单2" },
                { id: 5, title: "测试1", category: "task", favorite: true, description: "测试工单1" },
                { id: 6, title: "故障管理", category: "security", favorite: false, description: "故障管理流程" },
                { id: 7, title: "自动化管理", category: "task", favorite: false, description: "自动化管理流程" },
                { id: 8, title: "IM-HQ-20260415-0002_故障", category: "security", favorite: true, description: "故障处理工单" },
                { id: 9, title: "分派值班表人员", category: "task", favorite: false, description: "值班人员分派" },
                { id: 10, title: "待处理", category: "task", favorite: false, description: "待处理工单" },
                { id: 23, title: "总行基础设施变更流程", category: "security", favorite: true, description: "用于实施设备维护、环境部署、网络调整、应用系统运维、数据提取等基础设施变更，实现对该类变更的制定、审核、预审、评审、审批、实施、反馈、关闭等操作" },
                { id: 24, title: "分行及子公司基础设施变更流程", category: "security", favorite: true, description: "用于实施设备维护、网络调整、分行系统运维、数据提取等基础设施变更，实现对该类变更的制定、审批、报备、实施、反馈、关闭等操作" },
            ],
            changesence: [
                { id: 11, title: "例行变更-预审流程", category: "change", favorite: true, description: "例行变更预审流程" },
                { id: 12, title: "普通变更目录申请", category: "change", favorite: false, description: "普通变更目录申请" },
                { id: 13, title: "例行变更", category: "change", favorite: true, description: "例行变更流程" },
                { id: 14, title: "普通变更", category: "change", favorite: false, description: "普通变更流程" },
                { id: 15, title: "特急变更", category: "change", favorite: false, description: "特急变更流程" },
                { id: 16, title: "变更告警维护期自服务", category: "change", favorite: true, description: "变更告警维护" },
            ],
            resource: [
                { id: 17, title: "部署方案生成", category: "resource", favorite: true, description: "生成部署方案" },
                { id: 18, title: "IAAS实例申请", category: "resource", favorite: false, description: "IAAS实例申请流程" },
                { id: 19, title: "容器实例申请", category: "resource", favorite: true, description: "容器实例申请" },
                { id: 20, title: "资源释放", category: "resource", favorite: false, description: "资源释放流程" },
                { id: 21, title: "部署方案生成(演练)", category: "resource", favorite: false, description: "演练部署方案生成" },
                { id: 22, title: "部署方案生成(灾备)", category: "resource", favorite: false, description: "灾备部署方案生成" },
            ],
            change: [
                { id: 23, title: "总行基础设施变更流程", category: "security", favorite: true, description: "用于实施设备维护、环境部署、网络调整、应用系统运维、数据提取等基础设施变更，实现对该类变更的制定、审核、预审、评审、审批、实施、反馈、关闭等操作" },
                { id: 24, title: "分行及子公司基础设施变更流程", category: "security", favorite: true, description: "用于实施设备维护、网络调整、分行系统运维、数据提取等基础设施变更，实现对该类变更的制定、审批、报备、实施、反馈、关闭等操作" },
                { id: 25, title: "场景化变更模板管理流程", category: "security", favorite: true, description: "用于对变更场景化模板进行日常管理的流程，包括模板修订（录入、修改、删除）、模板审核、模板审批、模板评审等全生命周期环节" },
                { id: 26, title: "标准变更模板管理流程", category: "security", favorite: true, description: "用于对标准变更进行日常管理的流程，包括标准变更的修订（录入、修改、删除）、审核、审批、评审、预授权等全生命周期环节" },
            ]
        };
        
        // 分类数据
        const categories = [
            { id: "all", name: "全部" },
            { id: "favorites", name: "我的收藏" },
            { id: "change", name: "变更管理" },
            { id: "changesence", name: "场景化变更" },
            { id: "resource", name: "标准变更" },
            { id: "task", name: "服务请求" },
        ];
        
        // 当前选中的分类
        let currentCategory = "all";
        let currentCategorySearchKeyword = "";
        
        // 页面状态
        let isContentShown = false;
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 显示欢迎页面，隐藏内容区域
            showWelcomePage();
            
            // 初始化分类标签和搜索框
            renderCategoryTabs();
            
            // 初始化卡片
            renderCards(currentCategory);
            
            // 为左上角"变更管理系统"添加点击事件，回到初始页面
            document.getElementById('logoArea').addEventListener('click', function(e) {
                e.preventDefault();
                showWelcomePage();
                
                // 清除所有导航项的活动状态
                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(nav => nav.classList.remove('active'));
                
                // 清除所有分类标签的活动状态
                const categoryTabs = document.querySelectorAll('.category-tab');
                categoryTabs.forEach(tab => tab.classList.remove('active'));
            });
            
            // 修改点3: 为侧边栏新建按钮添加点击事件
            document.getElementById('sidebarNewBtn').addEventListener('click', function(e) {
                e.preventDefault();
                showContentPage();
                alert('新建工单功能');
            });
            
            // 为欢迎页面新建按钮添加点击事件
            document.getElementById('welcomeNewBtn').addEventListener('click', showContentPage);
            
            // 为"所有工单"导航项添加点击事件
            document.getElementById('navAllTickets').addEventListener('click', function(e) {
                e.preventDefault();
                showContentPage();
                
                // 更新导航状态
                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                
                // 更新当前分类
                currentCategory = "all";
                
                // 更新分类标签状态
                const categoryTabs = document.querySelectorAll('.category-tab');
                categoryTabs.forEach(tab => tab.classList.remove('active'));
                const allTab = document.querySelector('.category-tab[data-category="all"]');
                if (allTab) allTab.classList.add('active');
                
                // 更新页面标题
                document.getElementById('pageTitle').textContent = '所有工单';
                
                // 更新卡片
                renderCards(currentCategory);
            });
            
            // 为"我的收藏"导航项添加点击事件
            document.getElementById('navMyFavorites').addEventListener('click', function(e) {
                e.preventDefault();
                showContentPage();
                
                // 更新导航状态
                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                
                // 更新当前分类
                currentCategory = "favorites";
                
                // 更新分类标签状态
                const categoryTabs = document.querySelectorAll('.category-tab');
                categoryTabs.forEach(tab => tab.classList.remove('active'));
                const favoritesTab = document.querySelector('.category-tab[data-category="favorites"]');
                if (favoritesTab) favoritesTab.classList.add('active');
                
                // 更新页面标题
                document.getElementById('pageTitle').textContent = '我的收藏';
                
                // 更新卡片
                renderCards(currentCategory);
            });
            
            // 添加分类标签点击事件
            document.getElementById('categoryTabs').addEventListener('click', function(e) {
                if (e.target.classList.contains('category-tab')) {
                    // 更新分类标签状态
                    const tabs = this.querySelectorAll('.category-tab');
                    tabs.forEach(tab => tab.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    // 更新当前分类
                    currentCategory = e.target.getAttribute('data-category');
                    
                    // 更新卡片
                    renderCards(currentCategory);
                    
                    // 更新页面标题
                    updatePageTitle();
                }
            });
            
            // 添加分类搜索框的输入事件
            document.getElementById('categorySearchInput').addEventListener('input', function(e) {
                currentCategorySearchKeyword = e.target.value.toLowerCase();
                filterCards();
            });
            
            // 为其他导航项添加点击事件
            const otherNavItems = document.querySelectorAll('.nav-item:not(#navAllTickets):not(#navMyFavorites)');
            otherNavItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // 更新导航状态
                    const navItems = document.querySelectorAll('.nav-item');
                    navItems.forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 显示内容页面
                    showContentPage();
                    
                    // 根据点击的导航项更新内容
                    const navText = this.textContent.trim();
                    updateContentByNav(navText);
                });
            });
        });
        
        // 显示欢迎页面
        function showWelcomePage() {
            document.getElementById('welcomePage').style.display = 'flex';
            document.getElementById('contentArea').style.display = 'none';
            isContentShown = false;
        }
        
        // 显示内容页面
        function showContentPage() {
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('contentArea').style.display = 'block';
            isContentShown = true;
        }
        
        // 渲染分类标签和搜索框
        function renderCategoryTabs() {
            const categoryTabs = document.getElementById('categoryTabs');
            categoryTabs.innerHTML = '';
            
            // 创建分类标签搜索框
            const searchBox = document.createElement('div');
            searchBox.className = 'category-search-box';
            searchBox.innerHTML = `
                <i class="fas fa-search"></i>
                <input type="text" id="categorySearchInput" placeholder="搜索工单...">
            `;
            
            // 添加分类搜索框的输入事件
            searchBox.querySelector('input').addEventListener('input', function(e) {
                currentCategorySearchKeyword = e.target.value.toLowerCase();
                filterCards();
            });
            
            categoryTabs.appendChild(searchBox);
            
            // 创建分类标签
            categories.forEach(category => {
                const tab = document.createElement('div');
                tab.className = 'category-tab';
                if (category.id === currentCategory) {
                    tab.classList.add('active');
                }
                tab.setAttribute('data-category', category.id);
                tab.textContent = category.name;
                categoryTabs.appendChild(tab);
            });
        }
        
        // 渲染卡片
        function renderCards(category) {
            const cardsGrid = document.getElementById('cardsGrid');
            cardsGrid.innerHTML = '';
            
            // 获取当前分类的卡片数据
            let cards = getFilteredCards(category);
            
            // 渲染卡片
            if (cards.length > 0) {
                cards.forEach(card => {
                    const cardElement = createCardElement(card);
                    cardsGrid.appendChild(cardElement);
                });
            } else {
                // 如果没有卡片，显示提示
                showNoResultsMessage();
            }
        }
        
        // 获取过滤后的卡片数据
        function getFilteredCards(category) {
            // 获取基础卡片数据
            let cards = [];
            if (category === 'favorites') {
                // 如果是收藏，显示所有收藏的卡片
                cards = [...cardData.all, ...cardData.change, ...cardData.resource, ...cardData.changesence]
                    .filter(card => card.favorite);
            } else if (cardData[category]) {
                cards = cardData[category];
            } else if (category === 'all') {
                // 合并所有卡片
                cards = [...cardData.all, ...cardData.change, ...cardData.resource, ...cardData.changesence];
            } else {
                // 如果分类没有对应的数据，返回空数组
                cards = [];
            }
            
            // 应用分类内搜索过滤
            if (currentCategorySearchKeyword) {
                cards = cards.filter(card => {
                    const title = card.title.toLowerCase();
                    const desc = card.description.toLowerCase();
                    return title.includes(currentCategorySearchKeyword) || desc.includes(currentCategorySearchKeyword);
                });
            }
            
            return cards;
        }
        
        // 创建卡片元素
        function createCardElement(card) {
            const cardElement = document.createElement('div');
            cardElement.className = 'card';
            if (card.id === 17) { // 突出显示"部署方案生成"卡片
                cardElement.classList.add('highlighted');
            }
            
            cardElement.innerHTML = `
                <div class="card-icon">
                    <i class="fas fa-wrench"></i>
                </div>
                <button class="favorite-btn ${card.favorite ? 'active' : ''}" data-id="${card.id}">
                    <i class="fas fa-star"></i>
                </button>
                <div class="card-title">${card.title}</div>
                <div class="card-desc">${card.description}</div>
            `;
            
            // 添加卡片点击事件
            cardElement.addEventListener('click', function(e) {
                // 阻止事件冒泡，避免点击星星时触发卡片点击
                if (e.target.closest('.favorite-btn')) {
                    return;
                }
                alert(`打开工单: ${card.title}`);
            });
            
            // 添加收藏按钮点击事件
            const favoriteBtn = cardElement.querySelector('.favorite-btn');
            favoriteBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡
                
                const cardId = parseInt(this.getAttribute('data-id'));
                // 在全局卡片数据中查找并更新收藏状态
                let found = false;
                
                // 在all中查找
                for (let i = 0; i < cardData.all.length; i++) {
                    if (cardData.all[i].id === cardId) {
                        cardData.all[i].favorite = !cardData.all[i].favorite;
                        found = true;
                        break;
                    }
                }
                
                // 在change中查找
                if (!found) {
                    for (let i = 0; i < cardData.change.length; i++) {
                        if (cardData.change[i].id === cardId) {
                            cardData.change[i].favorite = !cardData.change[i].favorite;
                            found = true;
                            break;
                        }
                    }
                }
                
                // 在resource中查找
                if (!found) {
                    for (let i = 0; i < cardData.resource.length; i++) {
                        if (cardData.resource[i].id === cardId) {
                            cardData.resource[i].favorite = !cardData.resource[i].favorite;
                            found = true;
                            break;
                        }
                    }
                }
                
                // 在changesence中查找
                if (!found) {
                    for (let i = 0; i < cardData.changesence.length; i++) {
                        if (cardData.changesence[i].id === cardId) {
                            cardData.changesence[i].favorite = !cardData.changesence[i].favorite;
                            found = true;
                            break;
                        }
                    }
                }
                
                // 更新收藏按钮状态
                this.classList.toggle('active');
                
                // 如果当前在"我的收藏"页面，移除被取消收藏的卡片
                if (currentCategory === 'favorites' && !this.classList.contains('active')) {
                    cardElement.remove();
                    
                    // 检查是否还有卡片
                    const cardsGrid = document.getElementById('cardsGrid');
                    const remainingCards = cardsGrid.querySelectorAll('.card');
                    if (remainingCards.length === 0) {
                        showNoResultsMessage();
                    }
                }
            });
            
            return cardElement;
        }
        
        // 显示无结果消息
        function showNoResultsMessage() {
            const cardsGrid = document.getElementById('cardsGrid');
            const emptyMessage = document.createElement('div');
            emptyMessage.className = 'no-results';
            emptyMessage.innerHTML = `
                <i class="fas fa-search"></i>
                <p>没有找到匹配的工单</p>
                ${currentCategorySearchKeyword ? `<p>关键词: "${currentCategorySearchKeyword}"</p>` : ''}
            `;
            cardsGrid.appendChild(emptyMessage);
        }
        
        // 筛选卡片
        function filterCards() {
            const categorySearchText = document.getElementById('categorySearchInput') ? document.getElementById('categorySearchInput').value.toLowerCase() : '';
            
            // 更新分类内搜索关键词
            currentCategorySearchKeyword = categorySearchText;
            
            // 获取所有卡片
            const cards = document.querySelectorAll('.card');
            
            // 如果卡片为空，重新渲染
            if (cards.length === 0) {
                renderCards(currentCategory);
                return;
            }
            
            cards.forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                const desc = card.querySelector('.card-desc').textContent.toLowerCase();
                
                // 应用分类内搜索筛选
                const matchesCategorySearch = categorySearchText === '' || title.includes(categorySearchText) || desc.includes(categorySearchText);
                
                // 显示或隐藏卡片
                if (matchesCategorySearch) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
            
            // 检查是否有可见的卡片
            const visibleCards = Array.from(cards).filter(card => card.style.display !== 'none');
            const cardsGrid = document.getElementById('cardsGrid');
            
            // 移除之前的无结果消息
            const existingNoResults = cardsGrid.querySelector('.no-results');
            if (existingNoResults) {
                existingNoResults.remove();
            }
            
            // 如果没有可见的卡片，显示无结果消息
            if (visibleCards.length === 0 && cards.length > 0) {
                showNoResultsMessage();
            }
        }
        
        // 根据导航项更新内容
        function updateContentByNav(navText) {
            const pageTitle = document.getElementById('pageTitle');
            
            // 清除所有分类标签的激活状态
            const categoryTabs = document.querySelectorAll('.category-tab');
            categoryTabs.forEach(tab => tab.classList.remove('active'));
            
            // 根据导航项设置当前分类
            if (navText.includes('所有工单')) {
                pageTitle.textContent = '所有工单';
                currentCategory = 'all';
                
                // 激活"全部"分类标签
                const allTab = document.querySelector('.category-tab[data-category="all"]');
                if (allTab) allTab.classList.add('active');
            } else if (navText.includes('变更管理')) {
                pageTitle.textContent = '变更管理';
                currentCategory = 'change';
                
                // 激活"变更管理"分类标签
                const changeTab = document.querySelector('.category-tab[data-category="change"]');
                if (changeTab) changeTab.classList.add('active');
            } else if (navText.includes('标准变更')) {
                pageTitle.textContent = '标准变更';
                currentCategory = 'resource';
                
                // 激活"标准变更"分类标签
                const resourceTab = document.querySelector('.category-tab[data-category="resource"]');
                if (resourceTab) resourceTab.classList.add('active');
            } else if (navText.includes('我的收藏')) {
                pageTitle.textContent = '我的收藏';
                currentCategory = 'favorites';
                
                // 激活"我的收藏"分类标签
                const favoritesTab = document.querySelector('.category-tab[data-category="favorites"]');
                if (favoritesTab) favoritesTab.classList.add('active');
            } else {
                pageTitle.textContent = navText;
            }
            
            // 清空分类内搜索框
            const categorySearchInput = document.getElementById('categorySearchInput');
            if (categorySearchInput) {
                categorySearchInput.value = '';
                currentCategorySearchKeyword = '';
            }
            
            // 更新卡片
            renderCards(currentCategory);
        }
        
        // 更新页面标题
        function updatePageTitle() {
            const pageTitle = document.getElementById('pageTitle');
            const activeCategoryTab = document.querySelector('.category-tab.active');
            
            if (activeCategoryTab) {
                const categoryName = activeCategoryTab.textContent;
                pageTitle.textContent = categoryName;
            }
        }
    </script>
</body>
</html>
